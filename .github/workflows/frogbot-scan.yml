name: Frogbot Scan and Fix

on:
  pull_request_target: 
    types: [opened, synchronize] 
  push: 
    branches:
      - v1
  # schedule:
  #   - cron: "25 * * * *"  
  workflow_dispatch: 

permissions:
  pull-requests: write
  contents: write
  security-events: write
  id-token: write

jobs:
  frogbot-scan:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        branch: ["main", "v1"]
    steps:
      - uses: jfrog/frogbot@v2
        with:
          oidc-provider-name: ${{ secrets.OIDC_PROVIDER_NAME }}
          oidc-audience: repo:eladpl97/jfrog_task:ref:refs/heads/* 
        env:
          JF_URL: ${{ secrets.JFROG_URL }}
          JF_GIT_TOKEN: ${{ secrets.JF_GIT_TOKEN }}
          JF_GIT_BASE_BRANCH: ${{ matrix.branch }}
          JF_FIXABLE_ONLY: "TRUE"
