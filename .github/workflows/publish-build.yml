name: Workflow-Task
on:
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      docker_tag:
        description: 'Docker image tag'
        type: choice
        default: V1
        options:
          - V1
          - V2
        required: true

permissions:
  actions: read
  id-token: write
  packages: write
  security-events: write
  attestations: write
  contents: read

env:
  DOCKER_REPO: ${{ secrets.JFROG_DOCKER_REPO }}
  IMAGE_NAME: my-app
  JF_URL: ${{ vars.JF_URL }}
  NPM_VIRTUAL_REPO: ${{ vars.NPM_VIRTUAL_REPO }}
  JFROG_CLI_LOG_LEVEL: DEBUG
  IMAGE_TAG: ${{ github.event.inputs.docker_tag }}
  JF_REGISTRY: ${{ secrets.JFROG_REGISTRY_URL }}
  BUILD_NUMBER: ${{ github.run_number }}

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4

      - name: Setup JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4
        with:
          oidc-provider-name: ${{ secrets.OIDC_PROVIDER_NAME }}
          oidc-audience: repo:eladpl97/jfrog_task:ref:refs/heads/*

      - name: Verify JFrog connectivity
        run: jf rt ping

      - name: Set CLI Config
        run: jf npm-config --global=true --repo-resolve=${{ env.NPM_VIRTUAL_REPO }} --repo-deploy=${{ env.NPM_VIRTUAL_REPO }}

      - name: Build webapp
        run: jf npm ci

  docker-build-scan:   
    runs-on: ubuntu-latest
    needs: [setup]
    steps: 
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup JFrog CLI (OIDC)
        uses: jfrog/setup-jfrog-cli@v4
        with:
          oidc-provider-name: ${{ secrets.OIDC_PROVIDER_NAME }}
          oidc-audience: repo:eladpl97/jfrog_task:ref:refs/heads/*

      - name: Set false with express in index.js
        if: env.IMAGE_TAG == 'V2'
        run: |
          sed -i -E "s|express\.urlencoded\(\{[[:space:]]*extended:[[:space:]]*true[[:space:]]*\}\)|express.urlencoded({ extended: false })|g" src/index.js
          grep -n "extended: false" src/index.js

      - name: Override IMAGE_TAG if PR merged and contains 'moment'
        if: github.event.pull_request.merged == true && contains(github.event.pull_request.title, 'moment')
        run: |
          echo "IMAGE_TAG=V3" >> $GITHUB_ENV

      - name: Print image tag
        run: echo "Using IMAGE_TAG=$IMAGE_TAG"
      
      - name: Verify JFrog connectivity
        run: jf rt ping

      - name: Build Docker image
        run: |
          docker build -t ${{ env.JF_REGISTRY }}/${{ env.DOCKER_REPO }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} .

      - name: Push Docker image with build-info
        run: |
          jf docker push ${{ env.JF_REGISTRY }}/${{ env.DOCKER_REPO }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: scan build
        run:  jf build-scan ${{ env.JFROG_CLI_CI_JOB_ID }} ${{ env.BUILD_NUMBER }}

 