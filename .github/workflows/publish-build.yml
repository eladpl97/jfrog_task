name: Workflow-Task
on:
  workflow_dispatch:
    inputs:
      docker_tag:
        description: 'Docker image tag'
        required: false
        default: 'V1'
        type: string

permissions:
  actions: read
  id-token: write
  packages: write
  security-events: write
  attestations: write
  contents: read

env:
  DOCKER_REPO: ${{ secrets.JFROG_DOCKER_REPO }}
  IMAGE_NAME: my-app
  JF_URL: ${{ secrets.JFROG_URL }}
  NPM_VIRTUAL_REPO: ${{ vars.NPM_VIRTUAL_REPO }}
  DOCKER_BUILD_SUMMARY: false
  DOCKER_BUILD_RECORD_UPLOAD: false
  JFROG_CLI_LOG_LEVEL: DEBUG
  IMAGE_TAG: ${{ github.event.inputs.docker_tag }}
  JF_REGISTRY: ${{ secrets.JFROG_REGISTRY_URL }}
  BUILD_NUMBER: ${{ github.run_number }}

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4

      - name: Setup JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4
        with:
          oidc-provider-name: ${{ secrets.OIDC_PROVIDER_NAME }}
          oidc-audience: repo:eladpl97/jfrog_task:ref:refs/heads/*
      
      - name: Verify JFrog connectivity
        run: jf rt ping

      - name: Set CLI Config
        run: jf npm-config --global=true --repo-resolve=${{ env.NPM_VIRTUAL_REPO }} --repo-deploy=${{ env.NPM_VIRTUAL_REPO }}

      - name: Build webapp
        run: jf npm ci

  docker-build:   
    runs-on: ubuntu-latest
    needs: [setup]
    steps: 
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup JFrog CLI (OIDC)
        uses: jfrog/setup-jfrog-cli@v4
        with:
          oidc-provider-name: ${{ secrets.OIDC_PROVIDER_NAME }}
          oidc-audience: repo:eladpl97/jfrog_task:ref:refs/heads/*

      - name: Build Docker image
        run: |
          docker build -t ${{ env.JF_REGISTRY }}/${{ env.DOCKER_REPO }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} .

      - name: Push Docker image with build-info
        run: |
          jf docker push ${{ env.JF_REGISTRY }}/${{ env.DOCKER_REPO }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            --build-name=${{ env.IMAGE_NAME }} \
            --build-number=${{ env.BUILD_NUMBER }}

  publish-build:   
    runs-on: ubuntu-latest
    needs: [setup,docker-build]
    steps: 
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup JFrog CLI (OIDC)
        uses: jfrog/setup-jfrog-cli@v4
        with:
          oidc-provider-name: ${{ secrets.OIDC_PROVIDER_NAME }}
          oidc-audience: repo:eladpl97/jfrog_task:ref:refs/heads/*

      - name: Collect env & git for build
        run: |
          jf rt build-collect-env ${{ env.IMAGE_NAME }} ${{ env.BUILD_NUMBER }}
          jf rt build-add-git ${{ env.IMAGE_NAME }} ${{ env.BUILD_NUMBER }}

      - name: Publish build info
        run: jf rt bp "${{ env.IMAGE_NAME }}" "${{ env.BUILD_NUMBER }}"
  
  scan-build:
    runs-on: ubuntu-latest
    needs: [publish-build]
    steps:
      - name: Setup JFrog CLI (OIDC)
        uses: jfrog/setup-jfrog-cli@v4
        with:
          oidc-provider-name: ${{ secrets.OIDC_PROVIDER_NAME }}
          oidc-audience: repo:eladpl97/jfrog_task:ref:refs/heads/*

      - name: Scan the build with Xray
        run: |
          jf build-scan "${{ env.IMAGE_NAME }}" "${{ env.BUILD_NUMBER }}"

  